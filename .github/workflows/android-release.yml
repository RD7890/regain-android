name: Android Release Build

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**.md'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build_release_apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Write local.properties (permanent keystore)
        run: |
          echo "signing.storeFile=signing/regain-release.p12" >> local.properties
          echo "signing.storePassword=RegainRyzix2024!" >> local.properties
          echo "signing.keyAlias=regain" >> local.properties
          echo "signing.keyPassword=RegainRyzix2024!" >> local.properties

      - name: Auto-bump versionCode
        id: version
        run: |
          BUILD_NUM=${{ github.run_number }}
          VERSION_NAME="1.0.${BUILD_NUM}"
          echo "BUILD_NUMBER=${BUILD_NUM}" >> $GITHUB_ENV
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV
          echo "name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "code=${BUILD_NUM}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION_NAME} (code ${BUILD_NUM})"

      - name: Assemble Release APK
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          SIGNING_STORE_PASSWORD: RegainRyzix2024!
          SIGNING_KEY_PASSWORD: RegainRyzix2024!
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk dist/Regain-v${{ steps.version.outputs.name }}-build${{ steps.version.outputs.code }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Regain-APK-${{ steps.version.outputs.name }}-${{ steps.version.outputs.code }}
          path: dist/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-build.${{ steps.version.outputs.code }}
          name: "Regain v${{ steps.version.outputs.name }} (Build #${{ steps.version.outputs.code }})"
          body: |
            ## Regain — Automated Release

            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
            **Build:** #${{ steps.version.outputs.code }}

            ### Install
            Download the APK below and install on any Android 8.0+ device.
            Allow "Install from unknown sources" if prompted.

            > **First time upgrading from an older build?**
            > If you see "package conflict", uninstall the previous version first.
            > From this build onwards, the signing key is **permanent** — future updates install over each other.

            ### What's in this build
            - Permanent signing key (no more "package conflict" on updates)
            - Auto re-pins screen immediately when screen-pin is exited
            - Foreground service relaunches app every 2s while locked
            - Custom Regain Bold font across entire app
            - MIUI/Redmi Autostart permission prompt on first launch
            - Lockdown timer with foreground service
            - In-app dialer (Keypad / Contacts / Call Log)
            - Lock state persists across restarts
            - Session history with Room DB
          draft: false
          prerelease: false
          files: dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
